services:
    # ─────────────────────────────────────────────────────────────────────────────
    # roBrowserLegacy
    #
    # Config.local.js MUST be mounted for either image variant.
    # Copy applications/pwa/Config.local.js.example → Config.local.js,
    # set your server address, packetver, and renewal mode, then mount it.
    #
    # FULL image (GRFs baked in, ~5GB):
    #   ROBROWSER_TAG=1.0.0 docker compose up -d
    #
    # SLIM image (mount GRFs at runtime, ~400MB):
    #   ROBROWSER_TAG=1.0.0-slim GRF_PATH=/path/to/kRO docker compose up -d
    #
    # Game URL: http://localhost:3338/
    # ─────────────────────────────────────────────────────────────────────────────
    robrowser:
        image: ghcr.io/lenaxia/robrowserlegacy:${ROBROWSER_TAG:-latest}
        container_name: robrowserlegacy
        restart: unless-stopped
        # host network required so the embedded WS proxy can reach
        # rathena on 127.0.0.1:6900/6121/5121
        network_mode: host
        environment:
            PORT: '3338'
            NODE_ENV: 'production'
            ENABLE_WSPROXY: 'true'
            ENABLE_STATIC_SERVE: 'true'
            ROBROWSER_PATH: '/robrowser'
            CLIENT_PUBLIC_URL: 'http://localhost:3338'
            CACHE_MAX_FILES: '10000'
            CACHE_MAX_MEMORY_MB: '2048'
            CACHE_WARM_UP: 'true'
            CACHE_WARM_UP_LIMIT: '500'
        volumes:
            # Config.local.js is REQUIRED — set packetver, renewal, server address.
            # Copy Config.local.js.example to Config.local.js and edit it first.
            - ./Config.local.js:/robrowser/Config.local.js:ro

            # ── Slim image only: uncomment and set GRF_PATH ─────────────────────────
            # GRF_PATH can be set in a .env file or exported before running compose.
            #
            # - ${GRF_PATH}/data.grf:/app/resources/data.grf:ro     # required
            # - ${GRF_PATH}/rdata.grf:/app/resources/rdata.grf:ro   # required
            # - ${GRF_PATH}/DATA.INI:/app/resources/DATA.INI:ro     # required
            # - ${GRF_PATH}/BGM:/app/BGM:ro                         # optional (music)
