name: 'Build Docker Image'

# Triggered on tag push (e.g. v1.0.0, v1.2.3)
# Produces two images per tag:
#
#   ghcr.io/lenaxia/robrowserlegacy:<version>       — full (~5GB, GRFs baked in)
#   ghcr.io/lenaxia/robrowserlegacy:<version>-slim  — slim (~400MB, mount GRFs at runtime)
#
# Required secrets (for full image):
#   GRF_BASE_URL         — https://s3.thekao.cloud/ragnarok/data
#   S3_ACCESS_KEY_ID     — S3/MinIO access key ID
#   S3_SECRET_ACCESS_KEY — S3/MinIO secret access key
#
# If GRF secrets are not set, only the slim image is built.

concurrency:
    group: ${{ github.repository }}-docker-${{ github.ref }}
    cancel-in-progress: false

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: read
    packages: write

jobs:
    # ── Slim image ─────────────────────────────────────────────────────────────
    # No GRFs — fast build, small image. GRFs must be mounted at runtime.
    slim:
        name: 'Build slim image'
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5

            - name: 'Extract build version from tag'
              id: version
              run: echo "build_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: 'Free up disk space'
              run: sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet || true

            - name: 'Set up Docker Buildx'
              uses: docker/setup-buildx-action@v3

            - name: 'Log in to GitHub Container Registry'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 'Build and push slim image'
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.remoteclient
                  target: slim
                  push: true
                  build-args: BUILD_VERSION=${{ steps.version.outputs.build_version }}
                  tags: |
                      ghcr.io/${{ github.repository }}:${{ steps.version.outputs.build_version }}-slim
                      ghcr.io/${{ github.repository }}:latest-slim
                  cache-from: type=gha,scope=docker-slim
                  cache-to: type=gha,mode=max,scope=docker-slim
                  labels: |
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
                      ro.image.variant=slim
                      ro.build.version=${{ steps.version.outputs.build_version }}

            - name: 'Summary'
              run: |
                  echo "## Slim Image" >> $GITHUB_STEP_SUMMARY
                  echo "| | |" >> $GITHUB_STEP_SUMMARY
                  echo "|---|---|" >> $GITHUB_STEP_SUMMARY
                  echo "| **tag** | \`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.build_version }}-slim\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **GRF assets** | mount at runtime |" >> $GITHUB_STEP_SUMMARY

    # ── Full image ─────────────────────────────────────────────────────────────
    # GRFs baked in. Skipped if GRF secrets are not configured.
    full:
        name: 'Build full image'
        runs-on: ubuntu-latest
        steps:
            - name: 'Check GRF secrets are configured'
              id: check
              run: |
                  if [ -z "${{ secrets.GRF_BASE_URL }}" ]; then
                    echo "GRF_BASE_URL secret not set — skipping full image build."
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: 'Checkout repository'
              if: steps.check.outputs.skip == 'false'
              uses: actions/checkout@v5

            - name: 'Extract build version from tag'
              if: steps.check.outputs.skip == 'false'
              id: version
              run: echo "build_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

            - name: 'Free up disk space'
              if: steps.check.outputs.skip == 'false'
              run: |
                  sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet || true
                  df -h

            - name: 'Set up Docker Buildx'
              if: steps.check.outputs.skip == 'false'
              uses: docker/setup-buildx-action@v3

            - name: 'Log in to GitHub Container Registry'
              if: steps.check.outputs.skip == 'false'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 'Build and push full image'
              if: steps.check.outputs.skip == 'false'
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.remoteclient
                  target: full
                  push: true
                  build-args: |
                      BUILD_VERSION=${{ steps.version.outputs.build_version }}
                      GRF_BASE_URL=${{ secrets.GRF_BASE_URL }}
                  secrets: |
                      s3_access_key_id=${{ secrets.S3_ACCESS_KEY_ID }}
                      s3_secret_access_key=${{ secrets.S3_SECRET_ACCESS_KEY }}
                  tags: |
                      ghcr.io/${{ github.repository }}:${{ steps.version.outputs.build_version }}
                      ghcr.io/${{ github.repository }}:latest
                  # Reuse cached slim layers — only the GRF download stage is new
                  cache-from: |
                      type=gha,scope=docker-slim
                      type=gha,scope=docker-full
                  cache-to: type=gha,mode=max,scope=docker-full
                  labels: |
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
                      ro.image.variant=full
                      ro.build.version=${{ steps.version.outputs.build_version }}

            - name: 'Summary'
              if: steps.check.outputs.skip == 'false'
              run: |
                  echo "## Full Image" >> $GITHUB_STEP_SUMMARY
                  echo "| | |" >> $GITHUB_STEP_SUMMARY
                  echo "|---|---|" >> $GITHUB_STEP_SUMMARY
                  echo "| **tag** | \`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.build_version }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **GRF assets** | baked in |" >> $GITHUB_STEP_SUMMARY
